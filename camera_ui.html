<!DOCTYPE html>
<!--
  業務日報 撮影UI（v1.5-rev1 §2.1〜2.8）
  Phase D D-1 撮影UI スケルトン
  仕様：
    ・A4縦比 1:1.414 枠ガイド（L字マーカー4隅・半透明オーバーレイ50%）
    ・手動シャッター（自動撮影は不採用）
    ・撮影後プレビュー時に「指/留め具/他の紙が写り込んでいないか」確認ダイアログ
    ・rev1 追加：日付欄「R」or「令和」表記の確認質問
    ・JPEG 800×1200 圧縮品質85
    ・元画像は切り抜き後即破棄（LIFF側メモリからもクリア）
    ・3言語対応（日本語/English/Español）
  動作環境：
    ・LIFF環境（本番）：URLパラメータで liff_id を渡すと LIFF SDK で初期化
    ・ブラウザ単体（プレビュー）：LIFF未検出ならスタンドアロンで動作
-->
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>業務日報 撮影 / Daily Report Capture</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; color: #fff; font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif; }
    /* レイアウト全体 */
    #app { position: fixed; inset: 0; display: flex; flex-direction: column; }
    /* ヘッダ */
    .header { padding: 14px 16px; background: rgba(0,0,0,0.85); display: flex; justify-content: space-between; align-items: center; z-index: 10; }
    .header .title { font-size: 16px; font-weight: 600; }
    .header .lang { background: transparent; border: 1px solid #666; color: #fff; padding: 4px 10px; border-radius: 4px; font-size: 13px; }
    /* カメラエリア */
    #cameraArea { flex: 1; position: relative; overflow: hidden; background: #111; }
    #video { width: 100%; height: 100%; object-fit: cover; display: block; }
    /* 枠ガイド（A4縦比 1:1.414）+ L字マーカー + 半透明オーバーレイ */
    /* オーバーレイは中央に切り抜き穴があるイメージ。box-shadowで内側透過＆外側半透明黒 */
    .guide-overlay {
      position: absolute; left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 78vw;
      max-width: 320px;
      aspect-ratio: 1 / 1.414;
      box-shadow: 0 0 0 100vmax rgba(0, 0, 0, 0.5);
      pointer-events: none;
    }
    /* L字マーカー（四隅） */
    .corner { position: absolute; width: 8%; padding-bottom: 8%; }
    .corner::before, .corner::after {
      content: ''; position: absolute; background: #fff;
    }
    .corner::before { width: 100%; height: 3px; }
    .corner::after  { width: 3px;  height: 100%; }
    .corner.tl { top: 0; left: 0; }
    .corner.tr { top: 0; right: 0; transform: scaleX(-1); }
    .corner.bl { bottom: 0; left: 0; transform: scaleY(-1); }
    .corner.br { bottom: 0; right: 0; transform: scale(-1, -1); }
    /* ガイダンス文 */
    .guide-text {
      position: absolute; left: 0; right: 0; bottom: 100px;
      text-align: center; font-size: 14px; padding: 0 24px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.8); pointer-events: none;
    }
    /* シャッターボタン */
    .shutter-area { padding: 24px; background: rgba(0,0,0,0.85); display: flex; justify-content: center; }
    .shutter-btn {
      width: 72px; height: 72px; border-radius: 50%;
      background: #fff; border: 4px solid #444;
      cursor: pointer; transition: transform 0.1s;
    }
    .shutter-btn:active { transform: scale(0.92); }
    .shutter-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    /* プレビュー画面 */
    #previewScreen {
      position: absolute; inset: 0; background: #1a1a1a;
      display: none; flex-direction: column; z-index: 20;
    }
    #previewScreen.active { display: flex; }
    .preview-img-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 16px; overflow: hidden;
    }
    #previewImg {
      max-width: 100%; max-height: 100%; object-fit: contain;
      border: 2px solid #555;
    }
    .preview-checks {
      padding: 16px 24px; background: rgba(0,0,0,0.85); font-size: 14px;
    }
    .preview-checks .check-q {
      padding: 6px 0; display: flex; align-items: start; gap: 8px;
    }
    .preview-checks .check-q::before {
      content: '?'; display: inline-block; min-width: 18px; height: 18px;
      background: #ffa500; color: #000; border-radius: 50%;
      text-align: center; font-weight: 700; font-size: 12px; line-height: 18px;
    }
    .preview-buttons {
      padding: 12px 16px 20px; display: flex; gap: 12px; background: rgba(0,0,0,0.85);
    }
    .preview-buttons button {
      flex: 1; padding: 14px; border: none; border-radius: 6px;
      font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .btn-retry { background: #555; color: #fff; }
    .btn-send  { background: #06c755; color: #fff; }
    /* 送信中オーバーレイ */
    #sendingOverlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.85);
      display: none; flex-direction: column; align-items: center; justify-content: center;
      z-index: 30; gap: 16px;
    }
    #sendingOverlay.active { display: flex; }
    .spinner {
      width: 48px; height: 48px; border: 4px solid #444; border-top-color: #06c755;
      border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* エラー表示 */
    #errorBanner {
      position: absolute; top: 60px; left: 16px; right: 16px;
      padding: 12px 16px; background: #c0392b; color: #fff;
      border-radius: 6px; display: none; z-index: 40; font-size: 14px;
    }
    #errorBanner.active { display: block; }
  </style>
</head>
<body>
  <div id="app">
    <!-- ヘッダ -->
    <div class="header">
      <div class="title" data-i18n="title">業務日報 撮影</div>
      <select class="lang" id="langSelect">
        <option value="ja">日本語</option>
        <option value="en">English</option>
        <option value="es">Español</option>
      </select>
    </div>
    <!-- エラーバナー -->
    <div id="errorBanner"></div>
    <!-- カメラ -->
    <div id="cameraArea">
      <video id="video" autoplay playsinline muted></video>
      <div class="guide-overlay">
        <span class="corner tl"></span>
        <span class="corner tr"></span>
        <span class="corner bl"></span>
        <span class="corner br"></span>
      </div>
      <div class="guide-text" data-i18n="guide">枠内に伝票全体が収まるようにしてください</div>
    </div>
    <!-- シャッター -->
    <div class="shutter-area">
      <button class="shutter-btn" id="shutterBtn" aria-label="shutter"></button>
    </div>
    <!-- プレビュー -->
    <div id="previewScreen">
      <div class="preview-img-wrap">
        <img id="previewImg" alt="">
      </div>
      <div class="preview-checks">
        <div class="check-q" data-i18n="check_finger">指・留め具・他の紙が写り込んでいませんか？</div>
        <div class="check-q" data-i18n="check_r">日付欄に「R」または「令和」が入っていますか？（省略は混乱の元です）</div>
      </div>
      <div class="preview-buttons">
        <button class="btn-retry" id="retryBtn" data-i18n="btn_retry">撮り直す</button>
        <button class="btn-send" id="sendBtn" data-i18n="btn_send">この画像で送信</button>
      </div>
    </div>
    <!-- 送信中 -->
    <div id="sendingOverlay">
      <div class="spinner"></div>
      <div data-i18n="sending">送信中...</div>
    </div>
  </div>
  <script>
    // ============================================================
    // 多言語辞書（v1.4 共通方針#6：日本語マスター → DeepL → 人間レビュー）
    // ============================================================
    const I18N = {
      ja: {
        title: '業務日報 撮影',
        guide: '枠内に伝票全体が収まるようにしてください',
        check_finger: '指・留め具・他の紙が写り込んでいませんか？',
        check_r:      '日付欄に「R」または「令和」が入っていますか？（省略は混乱の元です）',
        btn_retry: '撮り直す',
        btn_send:  'この画像で送信',
        sending:   '送信中...',
        err_camera: 'カメラへのアクセスが拒否されました。設定からカメラを許可してください。',
        err_send:   '送信に失敗しました。再度お試しください。',
      },
      en: {
        title: 'Daily Report Capture',
        guide: 'Fit the entire report inside the frame',
        check_finger: 'Are any fingers, clips, or other papers visible in the frame?',
        check_r:      'Does the date field include "R" or "Reiwa"? (Omitting it causes confusion)',
        btn_retry: 'Retake',
        btn_send:  'Send this image',
        sending:   'Sending...',
        err_camera: 'Camera access denied. Please allow camera access in your settings.',
        err_send:   'Send failed. Please try again.',
      },
      es: {
        title: 'Captura del Informe Diario',
        guide: 'Coloque el informe completo dentro del marco',
        check_finger: '¿Aparecen dedos, sujetadores u otros papeles en el marco?',
        check_r:      '¿El campo de fecha incluye "R" o "Reiwa"? (Omitirlo causa confusión)',
        btn_retry: 'Reintentar',
        btn_send:  'Enviar esta imagen',
        sending:   'Enviando...',
        err_camera: 'Acceso a la cámara denegado. Permita el acceso desde la configuración.',
        err_send:   'Fallo al enviar. Intente nuevamente.',
      },
    };
    let currentLang = 'ja';
    function applyI18n() {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (I18N[currentLang] && I18N[currentLang][key]) {
          el.textContent = I18N[currentLang][key];
        }
      });
    }
    document.getElementById('langSelect').addEventListener('change', e => {
      currentLang = e.target.value;
      applyI18n();
    });
    function showError(key) {
      const banner = document.getElementById('errorBanner');
      banner.textContent = I18N[currentLang][key] || I18N.ja[key];
      banner.classList.add('active');
      setTimeout(() => banner.classList.remove('active'), 5000);
    }
    // ============================================================
    // LIFF 初期化（オプショナル）
    //   URLパラメータ ?liff_id=XXXXX が指定されていれば LIFF SDK で初期化、
    //   なければスタンドアロンで動作（ブラウザでのプレビュー用）
    // ============================================================
    let liffContext = { userId: null, languageHint: null, ready: false };
    async function initLiff() {
      const params = new URLSearchParams(window.location.search);
      const liffId = params.get('liff_id');
      if (!liffId) {
        console.log('[liff] LIFF ID not provided; running standalone.');
        liffContext.ready = true;
        return;
      }
      try {
        await loadScript('https://static.line-scdn.net/liff/edge/2.1/sdk.js');
        await window.liff.init({ liffId });
        const profile = await window.liff.getProfile();
        liffContext.userId = profile.userId;
        liffContext.languageHint = (window.liff.getLanguage() || 'ja').substring(0, 2);
        liffContext.ready = true;
        // 言語自動切替
        if (I18N[liffContext.languageHint]) {
          currentLang = liffContext.languageHint;
          document.getElementById('langSelect').value = currentLang;
          applyI18n();
        }
      } catch (e) {
        console.warn('[liff] init failed; running standalone:', e);
        liffContext.ready = true;
      }
    }
    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src;
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }
    // ============================================================
    // カメラ起動
    // ============================================================
    let videoStream = null;
    async function startCamera() {
      try {
        videoStream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: 'environment' },  // 背面カメラ優先
            width: { ideal: 1920 },
            height: { ideal: 1080 },
          },
          audio: false,
        });
        document.getElementById('video').srcObject = videoStream;
      } catch (e) {
        console.error('[camera] getUserMedia failed:', e);
        showError('err_camera');
      }
    }
    // ============================================================
    // 撮影：枠ガイド固定座標で切り抜き → JPEG 800×1200 quality 85
    //   元画像は切り抜き後に即破棄（LIFFメモリからもクリア）
    // ============================================================
    function captureFromVideo() {
      const video = document.getElementById('video');
      const overlay = document.querySelector('.guide-overlay');
      const overlayRect = overlay.getBoundingClientRect();
      const videoRect = video.getBoundingClientRect();
      // video の表示領域から「映像座標」へのスケール係数
      //   video element が cover フィットなので、実映像はクロップされている可能性あり
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      const dw = videoRect.width;
      const dh = videoRect.height;
      // object-fit: cover のスケール
      const scale = Math.max(dw / vw, dh / vh);
      const renderedW = vw * scale;
      const renderedH = vh * scale;
      const offsetX = (renderedW - dw) / 2;
      const offsetY = (renderedH - dh) / 2;
      // 画面上の枠ガイド位置 → video 座標
      const cropX = (overlayRect.left - videoRect.left + offsetX) / scale;
      const cropY = (overlayRect.top  - videoRect.top  + offsetY) / scale;
      const cropW = overlayRect.width  / scale;
      const cropH = overlayRect.height / scale;
      // 800×1200 のキャンバスに切り抜き描画
      const canvas = document.createElement('canvas');
      canvas.width  = 800;
      canvas.height = 1200;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, 800, 1200);
      // JPEG quality 85
      const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      // 元のフルフレーム破棄（LIFF/カメラストリーム由来のメモリも明示クリア）
      //   ※getImageDataのキャッシュは保持しない
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      return dataUrl;
    }
    // ============================================================
    // シャッター押下
    // ============================================================
    document.getElementById('shutterBtn').addEventListener('click', () => {
      const dataUrl = captureFromVideo();
      document.getElementById('previewImg').src = dataUrl;
      document.getElementById('previewScreen').classList.add('active');
      // セッションに一時保管（送信時に使用）
      window._capturedImage = dataUrl;
    });
    // 撮り直す
    document.getElementById('retryBtn').addEventListener('click', () => {
      document.getElementById('previewScreen').classList.remove('active');
      // プレビュー画像メモリも破棄
      document.getElementById('previewImg').src = '';
      window._capturedImage = null;
    });
    // 送信
    document.getElementById('sendBtn').addEventListener('click', async () => {
      const overlay = document.getElementById('sendingOverlay');
      overlay.classList.add('active');
      try {
        await sendImage(window._capturedImage);
        // 成功：プレビュー画像即破棄
        window._capturedImage = null;
        document.getElementById('previewImg').src = '';
        document.getElementById('previewScreen').classList.remove('active');
        if (liffContext.ready && window.liff && window.liff.closeWindow) {
          window.liff.closeWindow();
        }
      } catch (e) {
        console.error('[send] failed:', e);
        showError('err_send');
      } finally {
        overlay.classList.remove('active');
      }
    });
    // ============================================================
    // 画像送信
    //   LIFF環境：GAS Web App の doPost に JSON で直送（B案）
    //   スタンドアロン：モック（実装テスト用）
    // ============================================================
    async function sendImage(dataUrl) {
      if (window.liff && liffContext.userId) {
        // LIFF経由：GAS Web App の doPost に JSON で直送
        //   text/plain 指定で CORS プリフライトを回避（GAS Web App は CORS ヘッダを付けないため）
        const blob = await (await fetch(dataUrl)).blob();
        const base64 = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onloadend = () => resolve(reader.result.split(',')[1]);
          reader.onerror = reject;
          reader.readAsDataURL(blob);
        });
        const res = await fetch('https://script.google.com/macros/s/AKfycbw2JJ0Rl4USI1QAsmj2c0_AUyMntTD97P4_-Z6XvfzgfNITZjPksQoZWE6pZUxCla5enA/exec', {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({
            source: 'liff',
            user_id: liffContext.userId,
            timestamp: new Date().toISOString(),
            image_base64: base64,
          }),
        });
        if (!res.ok) throw new Error('GAS submit failed: ' + res.status);
      } else {
        // スタンドアロン：モック（実装テスト用）
        console.log('[send/mock] image size:', dataUrl.length, 'chars');
        await new Promise(r => setTimeout(r, 600));
      }
    }
    // ============================================================
    // 起動
    // ============================================================
    (async () => {
      applyI18n();
      await initLiff();
      await startCamera();
    })();
  </script>
</body>
</html>
